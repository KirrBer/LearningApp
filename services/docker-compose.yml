# docker-compose.yml — локальная конфигурация всех сервисов проекта.
# Сборка сервисов:
#   * nginx         — reverse-proxy/статический сервер (настраивается в nginx.conf)
#   * nextjs        — frontend приложение (Next.js)
#   * skill_analyzer — сервис/ML-пайплайн для извлечения навыков
#   * job_service   — API для вакансий
#   * kafka         — брокер сообщений (используется skill_analyzer)
#   * auth          - сервис авторизации
# Настройки берутся из файла services/.env (см. README.md)

services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    restart: unless-stopped
    networks:
      - default
  nextjs:
    build: ./frontend
    ports:
      - "3000:3000"
    restart: unless-stopped
    networks:
      - default
  skill_analyzer:
    build: ./skill_analyzer
    depends_on: 
      - skill_analyzer_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_SA}
      PGDATA: ${PGDATA}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST_SA}
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
    ports: 
      - "8000:8000"
    networks:
      - default
  skill_analyzer_db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_SA}
      PGDATA: ${PGDATA}
    volumes:
      - pgdata_sa:/var/lib/postgresql/data
    ports:
      - "5432:${DB_PORT}"
    restart: unless-stopped
    networks:
      - default
  job_service:
    build: ./job_service
    depends_on: 
      - job_service_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_JS}
      PGDATA: ${PGDATA}
      DB_PORT: ${DB_PORT}
      DB_HOST: ${DB_HOST_JS}
    ports: 
      - "8001:8000"
    networks:
      - default
  job_service_db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB_JS}
      PGDATA: ${PGDATA}
    volumes:
      - pgdata_js:/var/lib/postgresql/data
    ports:
      - "5433:${DB_PORT}"
    restart: unless-stopped
    networks:
      - default
  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - default
  auth_service:
    build: ./auth_service
    depends_on:
      - auth_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
      DB_HOST: auth_db
      SECRET_KEY: ${AUTH_SECRET_KEY}
    ports:
      - "8002:8000"
    networks:
      - default
    restart: unless-stopped

  auth_db:
    image: postgres:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: auth_db
    volumes:
      - auth_pgdata:/var/lib/postgresql
    ports:
      - "5434:5432"
    restart: unless-stopped
    networks:
      - default

volumes:
  pgdata_sa:
    driver: local
  pgdata_js:
    driver: local
  kafka-data:
    driver: local
  auth_pgdata:
    driver: local
networks:
  default:
    driver: bridge