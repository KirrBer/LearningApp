# nginx.conf — простая конфигурация для локальной разработки.
# Прокси для frontend (Next.js) и backend (FastAPI).

worker_processes 1;

events { worker_connections 1024; }

http {
    server {
        listen 80;
        server_name _; 

        # Все запросы на корень проксируем к Next.js (frontend).
        location / {
            proxy_pass http://nextjs:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Прокси для API skill_analyzer.
        # В prod эту секцию можно убрать или изменить на реальный домен.
        location /api/skill_analyzer/ {
            proxy_pass http://skill_analyzer:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}