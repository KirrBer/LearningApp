name: CI/CD Pipeline

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]


jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Тестирование бэкенда
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install skill_analyzer dependencies
        working-directory: ./services/skill_analyzer
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install pytest pytest-cov pytest-asyncio

      - name: Run skill_analyzer tests
        working-directory: ./services/skill_analyzer
        run: |
          pytest tests/ -v --cov=./ --cov-report=xml --cov-report=term

      - name: Install job_service dependencies
        working-directory: ./services/job_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Run job_service tests
        working-directory: ./services/job_service
        run: |
          pytest tests/ -v --cov=./ --cov-report=xml --cov-report=term


    